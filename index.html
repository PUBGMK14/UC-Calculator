<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC 계산기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page" id="welcomePage">
    <div class="welcome-logo">UC 계산기</div>
    <div class="welcome-sub">PUBG MOBILE · 모바일 배틀그라운드</div>
    <div class="welcome-question">어떤 OS의 정보를 원하시나요?</div>
    <div class="os-cards">
        <div class="os-card ios-card" onclick="selectOS('ios')">
            <div class="os-icon">
                <svg viewBox="0 0 384 512" width="100%" height="100%" fill="white">
                    <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-51.1-20.8-82.3-20.1-41.2.6-79.1 23.9-100.2 60.5-42.5 73.7-10.9 183.7 30.2 243.2 20.1 29 44.1 61.3 75.7 60.1 30.5-1.2 41.9-19.7 78.9-19.7 36.5 0 47.1 19.7 79 19 32.1-.6 53.1-29.3 72.8-58.1 22.6-33 32-65 32.5-66.6-.7-.3-63.1-24.2-63.4-96zM232 81.9c16.1-19.5 26.3-46.6 23.3-73.9-23.4 1-52 15.6-68.8 35.2-15.2 17.5-28.5 45.4-24.8 72 26 2.1 52.8-14 70.3-33.3z"/>
                </svg>
            </div>
            <div class="os-name">iOS</div>
            <div class="os-desc">App Store<br>누적 충전 보너스 포함</div>
        </div>
        <div class="os-card aos-card" onclick="selectOS('android')">
            <div class="os-icon">
                <svg viewBox="0 0 24 32" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <!-- 안테나 -->
                    <line x1="8.5" y1="4.4" x2="6.5" y2="1.9" stroke="#6ee7b7" stroke-width="1" stroke-linecap="round"/>
                    <line x1="15.5" y1="4.4" x2="17.5" y2="1.9" stroke="#6ee7b7" stroke-width="1" stroke-linecap="round"/>
                    <!-- 머리 (반원 채움) -->
                    <path d="M5 11.25 A7 7 0 0 1 19 11.25 Z" fill="#6ee7b7"/>
                    <!-- 눈 -->
                    <circle cx="9.5" cy="9.4" r="0.8" fill="#0a1628"/>
                    <circle cx="14.5" cy="9.4" r="0.8" fill="#0a1628"/>
                    <!-- 왼팔 -->
                    <rect x="2" y="12.5" width="2.2" height="6.5" rx="1.1" fill="#6ee7b7"/>
                    <!-- 오른팔 -->
                    <rect x="19.8" y="12.5" width="2.2" height="6.5" rx="1.1" fill="#6ee7b7"/>
                    <!-- 몸통 -->
                    <rect x="4.5" y="11.9" width="15" height="10" rx="1" fill="#6ee7b7"/>
                    <!-- 왼다리 -->
                    <rect x="6" y="21.9" width="4" height="5" rx="1.5" fill="#6ee7b7"/>
                    <!-- 오른다리 -->
                    <rect x="14" y="21.9" width="4" height="5" rx="1.5" fill="#6ee7b7"/>
                </svg>
            </div>
            <div class="os-name">Android</div>
            <div class="os-desc">Google Play<br>패키지 보너스 포함</div>
        </div>
    </div>
</div>

<div class="page hidden" id="calcPage">
    <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
        OS 선택으로 돌아가기
    </button>

    <h1 class="title" id="mainTitle">UC 최저가 계산기 <span class="title-badge">BETA</span></h1>
    <div class="calculator">
        <div class="input-group">
            <label id="inputLabel">필요한 UC를 입력하세요</label>
            <input type="number" id="mainInput" min="1" placeholder="예: 12000" onkeypress="handleEnterKey(event)">
        </div>
        <div class="checkbox-group" id="bonusRow">
            <input type="checkbox" id="useBonus" checked>
            <label for="useBonus">iOS 누적 충전 보너스 적용</label>
        </div>
        <button class="calc-btn" onclick="calculate()" id="calculateBtn">계산하기</button>
        <div id="result" class="result"></div>
        <div class="mode-toggle-wrapper">
            <div class="mode-pill">
                <div class="m-slider" id="mSlider"></div>
                <button class="m-tab active" id="tabPrice" onclick="setMode('price')">UC → 최저가</button>
                <button class="m-tab"        id="tabUC"    onclick="setMode('uc')">예산 → UC</button>
            </div>
        </div>
    </div>
</div>

<div class="version" id="versionTag">v3.1</div>
    <script src="script.js"></script>
</body>
</html>
